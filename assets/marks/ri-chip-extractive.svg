<?xml version="1.0" encoding="UTF-8"?>
<!--
  Resourcehip RI Tier Chip — Extractive  (position 2/5 on the Regenerative Index scale)
  Brand guidelines: RES-84. resourcehip.com
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 50" width="200" height="50"
     role="img" aria-label="RI tier: Extractive">
  <title>RI Tier: Extractive</title>
  <desc>Regenerative Index tier chip — Extractive (position 2 of 5). resourcehip.com</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&amp;display=swap');</style>
  </defs>

  <!-- Pill background -->
  <rect x="0" y="0" width="200" height="50" rx="18" fill="#c8920a"/>

  <!-- Tier name -->
  <text x="100" y="18"
        text-anchor="middle" dominant-baseline="central"
        font-family="Montserrat, 'Ubuntu Sans', sans-serif" font-weight="700" font-size="15.1"
        letter-spacing="0.06em"
        fill="white">EXTRACTIVE</text>

  <!-- RI position dots (1–5, left to right) -->
  <circle cx="42" cy="38" r="3.5" fill="white" opacity="1"/>
  <circle cx="71" cy="38" r="3.5" fill="white" opacity="1"/>
  <circle cx="100" cy="38" r="3.5" fill="white" opacity="0.25"/>
  <circle cx="129" cy="38" r="3.5" fill="white" opacity="0.25"/>
  <circle cx="158" cy="38" r="3.5" fill="white" opacity="0.25"/>
</svg>
