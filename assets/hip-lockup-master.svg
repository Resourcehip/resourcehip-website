<?xml version="1.0" encoding="UTF-8"?>
<!--
  HiP Lockup Master — RES-120
  ===========================
  Full corporate lockup: HiP Mark (shield) + Resourcehip wordmark + tagline.
  Four canonical configurations on one sheet.

  Geometry imported from hip-primitives.svg (logical):
    #shield (480x540), #shield-outline, #hip (328x224)
  Inlined here for self-contained delivery.

  Production typeface for "Resourcehip" wordmark and tagline:
    Manrope SemiBold (or licensed equivalent humanist sans).
  Renderer fallback used in PNG exports of this file: DejaVu Sans Bold.
  Outline to paths before final print/trademark filing.

  Colours:
    HiP Institutional Blue   #0E4C8F
    Mark Black               #1A1A1A
    Light surface            #F6F4EE
    Dark surface             #1A1A1A
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs>
    <symbol id="hip" viewBox="0 0 328 224" overflow="visible">
      <g transform="translate(0,16)" fill="currentColor">
        <rect x="0" y="0" width="36" height="200"/>
        <rect x="104" y="0" width="36" height="200"/>
        <rect x="36" y="82" width="68" height="36"/>
        <rect x="168" y="60" width="36" height="140"/>
        <circle cx="186" cy="30" r="22"/>
        <path fill-rule="evenodd"
              d="M 232 0 L 268 0 A 60 60 0 0 1 268 120 L 268 200 L 232 200 Z
                 M 268 36 A 24 24 0 0 1 268 84 L 268 36 Z"/>
      </g>
    </symbol>
    <symbol id="shield" viewBox="0 0 480 540" overflow="visible">
      <path d="M 40 40 H 440 V 340 C 440 405 360 460 240 500 C 120 460 40 405 40 340 Z"
            fill="currentColor"/>
    </symbol>
    <symbol id="shield-outline" viewBox="0 0 480 540" overflow="visible">
      <path d="M 40 40 H 440 V 340 C 440 405 360 460 240 500 C 120 460 40 405 40 340 Z"
            fill="none" stroke="currentColor" stroke-width="14"/>
    </symbol>
  </defs>

  <!-- Sheet background -->
  <rect width="1600" height="1100" fill="#F6F4EE"/>

  <!-- Header -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="80" y="80" font-size="13" font-weight="700" letter-spacing="4" fill="#0E4C8F">RES-120 · HIP LOCKUP MASTER</text>
    <text x="80" y="120" font-size="32" font-weight="500" fill="#1A1A1A">Resourcehip + HiP Mark — full lockup</text>
    <text x="80" y="150" font-size="15" font-weight="400" fill="#555">Four canonical configurations. Each cell is the same lockup; what changes is the surface and ink.</text>
  </g>
  <rect x="80" y="170" width="1440" height="1" fill="#D8D2C2"/>

  <!--
    LOCKUP GLYPH (reusable group)
    =============================
    Each configuration calls a symbol below with the colour cascaded via
    `color="..."` on <use>. Within each glyph: shield is sized 160w x 180h,
    HiP wordmark inside the shield is 80w x 54h placed with breathing-room
    adjustment (left bias 4 canvas px ≈ 8 shield-units), CERTIFIED below.
    "Resourcehip" wordmark sits to the right of the shield with 32px gap.
    Tagline HUMAN IMPACT PROFILE sits beneath Resourcehip in spaced caps.
    Total glyph footprint approximately 580w x 200h.
  -->

  <!-- ================== CELL 1 — COLOUR (PRIMARY) ================== -->
  <g transform="translate(120, 240)">
    <rect x="-40" y="-40" width="660" height="320" fill="#F6F4EE"/>
    <text x="0" y="-12" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#999">1 · COLOUR · PRIMARY</text>

    <!-- Shield + interior -->
    <use href="#shield" x="0" y="0" width="160" height="180" color="#0E4C8F"/>
    <use href="#hip" x="30" y="36" width="93" height="63" color="#FFFFFF"/>
    <text x="80" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#FFFFFF">CERTIFIED</text>

    <!-- Resourcehip wordmark + tagline -->
    <text x="200" y="100" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1" fill="#0E4C8F">Resourcehip</text>
    <text x="202" y="138" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="6" fill="#0E4C8F">HUMAN  IMPACT  PROFILE</text>
  </g>

  <!-- ================== CELL 2 — MONO BLACK ================== -->
  <g transform="translate(820, 240)">
    <rect x="-40" y="-40" width="660" height="320" fill="#F6F4EE"/>
    <text x="0" y="-12" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#999">2 · MONO BLACK · SINGLE-INK PRINT</text>

    <use href="#shield" x="0" y="0" width="160" height="180" color="#1A1A1A"/>
    <use href="#hip" x="30" y="36" width="93" height="63" color="#F6F4EE"/>
    <text x="80" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#F6F4EE">CERTIFIED</text>

    <text x="200" y="100" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1" fill="#1A1A1A">Resourcehip</text>
    <text x="202" y="138" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="6" fill="#1A1A1A">HUMAN  IMPACT  PROFILE</text>
  </g>

  <!-- ================== CELL 3 — REVERSED ON WHITE (OUTLINE / FOIL READY) ================== -->
  <g transform="translate(120, 640)">
    <rect x="-40" y="-40" width="660" height="320" fill="#FFFFFF" stroke="#D8D2C2"/>
    <text x="0" y="-12" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#999">3 · OUTLINE ON WHITE · FOIL / EMBOSS</text>

    <use href="#shield-outline" x="0" y="0" width="160" height="180" color="#0E4C8F"/>
    <use href="#hip" x="30" y="36" width="93" height="63" color="#0E4C8F"/>
    <text x="80" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#0E4C8F">CERTIFIED</text>

    <text x="200" y="100" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1" fill="#0E4C8F">Resourcehip</text>
    <text x="202" y="138" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="6" fill="#0E4C8F">HUMAN  IMPACT  PROFILE</text>
  </g>

  <!-- ================== CELL 4 — REVERSED ON DARK ================== -->
  <g transform="translate(820, 640)">
    <rect x="-40" y="-40" width="660" height="320" fill="#1A1A1A"/>
    <text x="0" y="-12" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#777">4 · REVERSED ON DARK · WHITE OUT</text>

    <use href="#shield-outline" x="0" y="0" width="160" height="180" color="#FFFFFF"/>
    <use href="#hip" x="30" y="36" width="93" height="63" color="#FFFFFF"/>
    <text x="80" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#FFFFFF">CERTIFIED</text>

    <text x="200" y="100" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1" fill="#FFFFFF">Resourcehip</text>
    <text x="202" y="138" font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="6" fill="#FFFFFF">HUMAN  IMPACT  PROFILE</text>
  </g>

  <!-- Footer note -->
  <text x="800" y="1060" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" fill="#999">SHIELD + INTERIOR HIP + WORDMARK + TAGLINE · BLUE #0E4C8F · BLACK #1A1A1A · LIGHT #F6F4EE</text>
</svg>
