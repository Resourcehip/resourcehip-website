# Hero Image Manifest — Canonical image selection per product category
#
# This file is the source of truth for which hero image variant is canonical.
# The branding audit (scripts/brand-audit.py) enforces consistency with this manifest.
#
# source values:
#   comfyui  — AI-generated via ComfyUI pipeline (single file, no variants)
#   variant  — selected from directory of variants (v1–v4)
#   manual   — manually chosen or provided image
#
# To change the canonical image for a category:
#   1. Update the 'image' path here
#   2. Update the rating frontmatter header_image to match
#   3. Commit both changes together

