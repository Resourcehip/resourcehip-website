<?xml version="1.0" encoding="UTF-8"?>
<!--
  HiP shield-lockup tier variant — Silver
  =================================================
  Source of truth: hip-primitives.svg + hip-lockup-master.svg (RES-120).
  Issue: RES-189 (deliverable for RES-123).

  This file is for VERIFIED-RATING LICENSEES ONLY. The tier wordmark
  ("Silver") and accent colour (#7a9ab8) MUST NOT appear on
  generic-rating assets. The shield geometry and HiP letterforms here
  are byte-for-byte identical to the master lockup; only the accent
  colour and tier wordmark change between variants.

  Geometry: 200-unit cap-height grid; shield 480x540; HiP letterform
  329x224 (placed at shield-native (90,108) width 280 height 189 to
  match the master cell's left-bias breathing room).

  Production typeface for "Silver" wordmark: Manrope SemiBold
  (or licensed humanist sans equivalent). Renderer fallback for PNG
  exports: DejaVu Sans Bold. Outline to paths before final filing.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 720" width="480" height="720">
  <defs>
    <symbol id="hip" viewBox="0 0 328 224" overflow="visible">
      <g transform="translate(0,16)" fill="currentColor">
        <rect x="0" y="0" width="36" height="200"/>
        <rect x="104" y="0" width="36" height="200"/>
        <rect x="36" y="82" width="68" height="36"/>
        <rect x="168" y="60" width="36" height="140"/>
        <circle cx="186" cy="30" r="22"/>
        <path fill-rule="evenodd"
              d="M 232 0 L 268 0 A 60 60 0 0 1 268 120 L 268 200 L 232 200 Z
                 M 268 36 A 24 24 0 0 1 268 84 L 268 36 Z"/>
      </g>
    </symbol>
    <symbol id="shield" viewBox="0 0 480 540" overflow="visible">
      <path d="M 40 40 H 440 V 340 C 440 405 360 460 240 500 C 120 460 40 405 40 340 Z"
            fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Shield silhouette (tier accent) -->
  <use href="#shield" x="0" y="0" width="480" height="540" color="#7a9ab8"/>

  <!-- HiP letterform inside shield (white knockout, master geometry x3) -->
  <use href="#hip" x="90" y="108" width="280" height="189" color="#FFFFFF"/>

  <!-- CERTIFIED hairline below HiP, inside shield -->
  <text x="240" y="414" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="33" font-weight="700" letter-spacing="9"
        fill="#FFFFFF">CERTIFIED</text>

  <!-- Tier wordmark below shield -->
  <text x="240" y="650" text-anchor="middle"
        font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif"
        font-size="84" font-weight="700" letter-spacing="0"
        fill="#7a9ab8">Silver</text>
</svg>
