<?xml version="1.0" encoding="UTF-8"?>
<!--
  HiP Lockup — Colour Primary (Cell 1, extracted from hip-lockup-master.svg)
  Transparent background. Paths inlined with explicit fills for reliable
  rendering when used as <img> src (no <use>/<symbol>/currentColor dependency).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" role="img"
     aria-label="Resourcehip — HiP Certified">
  <title>Resourcehip — HiP Certified</title>

  <!-- Shield: path from 480×540 symbol space, scaled ×(1/3) → 160×180 at origin -->
  <g transform="scale(0.33333)">
    <path d="M 40 40 H 440 V 340 C 440 405 360 460 240 500 C 120 460 40 405 40 340 Z"
          fill="#0E4C8F"/>
  </g>

  <!-- HiP letterforms: 328×224 symbol space, scaled ×0.2835, translated to (30,36) -->
  <g transform="translate(30,36) scale(0.2835)">
    <g transform="translate(0,16)" fill="#FFFFFF">
      <rect x="0"   y="0"  width="36" height="200"/>
      <rect x="104" y="0"  width="36" height="200"/>
      <rect x="36"  y="82" width="68" height="36"/>
      <rect x="168" y="60" width="36" height="140"/>
      <circle cx="186" cy="30" r="22"/>
      <path fill-rule="evenodd"
            d="M 232 0 L 268 0 A 60 60 0 0 1 268 120 L 268 200 L 232 200 Z
               M 268 36 A 24 24 0 0 1 268 84 L 268 36 Z"/>
    </g>
  </g>

  <!-- CERTIFIED label inside shield -->
  <text x="80" y="138" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="11" font-weight="700" letter-spacing="3" fill="#FFFFFF">CERTIFIED</text>

  <!-- Resourcehip wordmark -->
  <text x="200" y="100"
        font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-1" fill="#0E4C8F">Resourcehip</text>

  <!-- Tagline -->
  <text x="202" y="138"
        font-family="DejaVu Sans, Manrope, Inter, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="700" letter-spacing="6" fill="#0E4C8F">HUMAN  IMPACT  PROFILE</text>
</svg>
